<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Signal Platform{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  {% block extra_head %}{% endblock %}
</head>
<body {% block body_attrs %}{% endblock %}>
  <div class="dashboard-shell">
    <div class="grid-overlay"></div>
    <header class="topbar">
      <div class="brand">
        <div class="brand-box mono">DA</div>
        <div>
          <div class="brand-title">DutchAlpha Dashboard</div>
          <div class="brand-sub">Algorithmic trading observability</div>
        </div>
      </div>
      <nav class="top-nav">
        <a href="/" class="top-nav__link{% if request.url.path == '/' %} is-active{% endif %}">Overview</a>
        <a href="/strategies" class="top-nav__link{% if request.url.path == '/strategies' %} is-active{% endif %}">Strategies</a>
        <a href="/validation" class="top-nav__link{% if request.url.path == '/validation' %} is-active{% endif %}">Validation</a>
        <a href="/candles" class="top-nav__link{% if request.url.path == '/candles' %} is-active{% endif %}">Candles</a>
        <a href="/performance" class="top-nav__link{% if request.url.path == '/performance' %} is-active{% endif %}">Performance</a>
        <a href="/circuit" class="top-nav__link{% if request.url.path == '/circuit' %} is-active{% endif %}">Circuit</a>
        <a href="/monte-carlo" class="top-nav__link{% if request.url.path == '/monte-carlo' %} is-active{% endif %}">Monte Carlo</a>
      </nav>
      <div class="status-pill mono">
        <span class="status-dot"></span>
        Live
      </div>
    </header>
    <div class="content-wrap">
      <main class="content">{% block content %}{% endblock %}</main>
    </div>
  </div>
</body>
</html>
